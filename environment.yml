channels:
  - conda-forge
  - bioconda
dependencies:
  # System tools
  - blast
  - just
  - pigz
  - python >=3.10
  - wget
  # Python deps (mirrors bioconda run requirements)
  - biopython
  - jinja2
  - openpyxl
  - pandas >=2.2.0
  - psutil >=5.9.0
  - pyyaml
  - rauth
  - requests
  - rich <14
  - rich-click >=1.6.0
  - tqdm
  # Dev/test tools
  - poetry
  - pytest
  - pytest-cov
  - pytest-mock
  - responses
  - ruff
